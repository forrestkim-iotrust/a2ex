name: Build & Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'daemon/**'
      - 'plugin/**'
      - 'docker/**'
      - 'Dockerfile'
      - '.dockerignore'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            os: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            os: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/forrestkim-iotrust/a2ex
          tags: |
            type=raw,value=latest-${{ matrix.suffix }}
            type=raw,value=${{ matrix.suffix }}-{{sha}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,scope=${{ matrix.suffix }},mode=max

  manifest:
    name: Create multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Create and push manifest
        run: |
          REPO=ghcr.io/forrestkim-iotrust/a2ex
          docker buildx imagetools create -t $REPO:latest \
            $REPO:latest-amd64 \
            $REPO:latest-arm64
          docker buildx imagetools create -t $REPO:sha-${GITHUB_SHA::7} \
            $REPO:latest-amd64 \
            $REPO:latest-arm64

name: Build & Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'daemon/**'
      - 'plugin/**'
      - 'docker/**'
      - 'Dockerfile'
      - '.dockerignore'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            os: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            os: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/forrestkim-iotrust/a2ex:${{ matrix.suffix }}-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,scope=${{ matrix.suffix }},mode=max

  manifest:
    name: Create multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          SHA=${{ github.sha }}
          REPO=ghcr.io/forrestkim-iotrust/a2ex

          docker manifest create $REPO:latest \
            $REPO:amd64-$SHA \
            $REPO:arm64-$SHA

          docker manifest create $REPO:sha-${SHA::7} \
            $REPO:amd64-$SHA \
            $REPO:arm64-$SHA

          docker manifest push $REPO:latest
          docker manifest push $REPO:sha-${SHA::7}

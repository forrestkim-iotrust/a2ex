name: Release Daemon Binary

on:
  push:
    tags: ['daemon-v*']

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: a2ex-mcp
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: a2ex-mcp
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: a2ex-mcp
            cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: a2ex-mcp
            cross: false
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon
      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libssl-dev:arm64 pkg-config
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml
        env:
          DEBIAN_FRONTEND: noninteractive
      - name: Set cross-compile env
        if: matrix.cross
        run: |
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "OPENSSL_DIR=/usr" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=/usr/include/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=/usr/lib/aarch64-linux-gnu" >> $GITHUB_ENV
      - run: cargo build --release --target ${{ matrix.target }} -p a2ex-mcp
      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../a2ex-mcp-${{ matrix.target }}.tar.gz ${{ matrix.binary }}
      - uses: softprops/action-gh-release@v2
        with:
          files: daemon/a2ex-mcp-${{ matrix.target }}.tar.gz
